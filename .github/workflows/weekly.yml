name: Weekly PGA forecast

on:
  schedule:
    # Tuesday 16:11 UTC. DataGolf only publishes the upcoming event's model on
    # Monday afternoon/Tuesday, so a Monday run pulls last week's data. Tuesday
    # guarantees fresh inputs + a complete field. Off the top-of-hour to dodge
    # GitHub's cron congestion (which delays :00 jobs). A staleness guard in
    # fetch_datagolf.py fails the run rather than emailing stale data, just in case.
    - cron: "11 16 * * 2"
  workflow_dispatch: {}   # allow manual runs from the Actions tab / gh CLI

permissions:
  contents: write          # so the job can commit the run history back

concurrency:
  group: weekly-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet numpy

      - name: Run weekly forecast (fetch -> simulate -> analyze -> email)
        id: run
        env:
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: python run_week.py

      - name: Commit run history
        run: |
          git config user.name "pga-predictor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add runs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "forecast: ${{ steps.run.outputs.date }}"
            git push
          fi
