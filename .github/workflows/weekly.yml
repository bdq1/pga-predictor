name: Weekly PGA forecast

on:
  schedule:
    # Monday 14:00 UTC (after DataGolf's ~12:00 UTC Monday feed refresh).
    - cron: "0 14 * * 1"
  workflow_dispatch: {}   # allow manual runs from the Actions tab / gh CLI

permissions:
  contents: write          # so the job can commit the run history back

concurrency:
  group: weekly-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet numpy

      - name: Run weekly forecast (fetch -> simulate -> analyze -> email)
        id: run
        env:
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: python run_week.py

      - name: Commit run history
        run: |
          git config user.name "pga-predictor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add runs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "forecast: ${{ steps.run.outputs.date }}"
            git push
          fi
